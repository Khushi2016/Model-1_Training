<!DOCTYPE html>
<html>
<head>
    <title>Block Animation</title>

    <style>
        body{
            background:#f2f2f2;
        }

        .block{
            width:120px;
            height:120px;
            background:purple;
            position:relative;

            animation:blockmove 5s infinite;
        }

        @keyframes blockmove{

            0%{
                left:0;
                top:0;
                background:red;
            }

            25%{
                left:300px;
                top:0;
                background:blue;
                transform:rotate(90deg);
            }

            50%{
                left:300px;
                top:200px;
                background:green;
                transform:rotate(180deg);
            }

            75%{
                left:0;
                top:200px;
                background:orange;
                transform:rotate(270deg);
            }

            100%{
                left:0;
                top:0;
                background:purple;
                transform:rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="block"></div>

</body>
</html>
