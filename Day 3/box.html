<!DOCTYPE html>
<html>
<head>
    <title>CSS Box Model</title>

    <style>

        .box{
            width:300px;
            height:150px;

            background-color:rgb(118, 56, 199);

            border:5px solid rgb(235, 131, 13);

            padding:30px;

            margin:50px auto;

            text-align:center;
            font-size:22px;
            font-family:Arial;

            box-sizing:border-box;
        }

    </style>
</head>

<body>

    <div class="box">
        This is CSS Box Model
    </div>

</body>
</html>
