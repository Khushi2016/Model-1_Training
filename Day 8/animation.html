<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Image Animation & Transform</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex justify-center items-center h-screen">

  <!-- Image Card -->

  <div class="bg-white p-5 rounded-2xl shadow-2xl
              transform transition duration-500
              hover:scale-110 hover:rotate-3 hover:-translate-y-4">

    <!-- Image -->

    <img src="https://picsum.photos/400/250"
         alt="Sample Image"
         class="rounded-xl animate-pulse">

    <!-- Text -->

    <h1 class="text-3xl font-bold text-center mt-5">
      Beautiful Nature
    </h1>

    <p class="text-center text-gray-600 mt-2">
      Hover on the card to see transform effects.
    </p>

  </div>

</body>
</html>
