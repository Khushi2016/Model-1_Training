<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tailwind Animation & Transform</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex justify-center items-center h-screen">

  <!-- Animated Box -->

  <div class="bg-purple-600 text-white text-3xl font-bold
              p-10 rounded-2xl shadow-2xl

              transform transition duration-500

              hover:scale-110
              hover:rotate-6
              hover:-translate-y-5

              animate-ping">

      Hover Me

  </div>

</body>
</html>
