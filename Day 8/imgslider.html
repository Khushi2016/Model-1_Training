<!DOCTYPE html>
<html>
<head>

    <title>Bootstrap Carousel</title>

    <!-- Bootstrap CSS -->

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <!-- Carousel Start -->

        <div id="carouselExampleControls"
            class="carousel slide"
            data-ride="carousel">

            <!-- Indicators -->

            <ol class="carousel-indicators">

                <li data-target="#carouselExampleControls"
                    data-slide-to="0"
                    class="active">
                </li>

                <li data-target="#carouselExampleControls"
                    data-slide-to="1">
                </li>

                <li data-target="#carouselExampleControls"
                    data-slide-to="2">
                </li>

            </ol>

            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="https://media.istockphoto.com/id/517188688/photo/mountain-landscape.jpg?s=612x612&w=0&k=20&c=A63koPKaCyIwQWOTFBRWXj_PwCrR4cEoOw2S9Q7yVl8="
                        class="d-block w-100 img-fluid"
                        style="height:500px; object-fit:cover;"
                        alt="Image 1">

                    <div class="carousel-caption d-none d-md-block">
                        <div class="text-white p-3 rounded"
                            style="background:rgba(0,0,0,0.5);">
                            <h3>Mountain View</h3>
                            <p>
                                Beautiful natural mountain landscape.
                            </p>
                        </div>
                    </div>
                </div>

                <div class="carousel-item">

                    <img src="https://m.media-amazon.com/images/I/71oDTJru50L.jpg"
                        class="d-block w-100 img-fluid"
                        style="height:500px; object-fit:cover;"
                        alt="Image 2">

                    <div class="carousel-caption d-none d-md-block">
                        <div class="text-white p-3 rounded"
                            style="background:rgba(0,0,0,0.5);">
                            <h3>Nature Wallpaper</h3>
                            <p>
                                Amazing greenery and peaceful environment.
                            </p>
                        </div>
                    </div>
                </div>

                <div class="carousel-item">

                    <img src="https://m.media-amazon.com/images/I/8192Yt4zAfL._AC_UF894,1000_QL80_.jpg"
                        class="d-block w-100 img-fluid"
                        style="height:500px; object-fit:cover;"
                        alt="Image 3">

                    <div class="carousel-caption d-none d-md-block">
                        <div class="text-white p-3 rounded"
                            style="background:rgba(0,0,0,0.5);">
                            <h3>Adventure Time</h3>
                            <p>
                                Explore beautiful travel destinations.
                            </p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Previous Button -->

            <button class="carousel-control-prev"
                type="button"
                data-target="#carouselExampleControls"
                data-slide="prev">

                <span class="carousel-control-prev-icon"
                    aria-hidden="true">
                </span>

                <span class="sr-only">
                    Previous
                </span>

            </button>

            <!-- Next Button -->

            <button class="carousel-control-next"
                type="button"
                data-target="#carouselExampleControls"
                data-slide="next">

                <span class="carousel-control-next-icon"
                    aria-hidden="true">
                </span>

                <span class="sr-only">
                    Next
                </span>

            </button>

        </div>

        <!-- Carousel End -->

    </div>

    <!-- Bootstrap JS -->

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
