<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            background:#f4f4f4;
        }

        /* Navbar */

        .navbar{
            background:#0d6efd;
            padding:15px 40px;
        }

        .navbar-brand{
            color:white;
            font-size:28px;
            font-weight:bold;
        }

        .navbar-nav .nav-link{
            color:white;
            margin-left:20px;
        }

        .navbar-nav .nav-link:hover{
            color:yellow;
        }

        .hero{
            height:90vh;
            background:linear-gradient(to right, #fe954f, #0059fe);

            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            color:white;
            flex-direction:column;
        }

        .hero h1{
            font-size:60px;
            margin-bottom:20px;
        }

        .hero p{
            font-size:22px;
            width:70%;
        }

        .hero button{
            margin-top:25px;
            padding:12px 30px;
            border:none;
            background:white;
            color:#0d6efd;
            font-size:18px;
            border-radius:8px;
            transition:0.3s;
        }

        .hero button:hover{
            background:#0d6efd;
            color:white;
        }

        .section{
            padding:60px 40px;
            text-align:center;
        }

        .section h2{
            margin-bottom:20px;
            color:#0d6efd;
        }

    </style>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <nav class="navbar navbar-expand-lg">

        <div class="container-fluid">

            <a class="navbar-brand" href="#">MyWebsite</a>

            <button class="navbar-toggler bg-light" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="#">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Services</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact</a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <section class="hero">

        <h1>Welcome to My Website</h1>

        <p>
            This is a simple home page design using HTML, CSS and Bootstrap.
            Later you can easily add Bootstrap Grid System here.
        </p>

        <button>Explore More</button>

    </section>

    <section class="section">

        <h2>Bootstrap Grid Section</h2>

        <p>
            Add your Bootstrap rows and columns here later.
        </p>

    </section>

</body>
</html>
